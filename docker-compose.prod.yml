services:
  strapi:
    image: ghcr.io/almatn/tours-strapi:latest
    depends_on:
      - strapi-db
    env_file:
      - .env.production
    networks:
      - buybuy_default
    volumes:
      - media_strapi:/app/public/uploads

  strapi-db:
    image: postgres:16-bookworm
    env_file:
      - .env.production
    volumes:
      - pgdatastrapi:/var/lib/postgresql/data
    networks:
      - buybuy_default

  strapi-frontend:
    image: ghcr.io/almatn/tours-frontend:latest
    env_file:
      - .env.production
    depends_on:
      - strapi
    networks:
      - buybuy_default
    
volumes:
  pgdatastrapi:
  media_strapi:

networks:
  buybuy_default:
    external: true
